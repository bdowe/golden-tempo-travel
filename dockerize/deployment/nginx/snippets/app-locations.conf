# Shared gateway location set — included at *server* scope by both the
# deployment :80 server (nginx/default.conf) and the production :443 TLS
# server (dockerize/production/nginx/prod.conf). Keep anything server-shape
# specific (listen/server_name/ssl) out of this file.
#
# Depends on the $share_prerender map defined in share-prerender-map.conf
# (http scope — maps are not allowed inside server blocks).

root /usr/share/nginx/html;
index index.html;

location /api/ {
    proxy_pass http://api:8080;
    proxy_http_version 1.1;
    # Above nginx's 1 MiB default for /transcribe audio clips; the Go
    # bodyLimitMiddleware enforces the real per-endpoint caps.
    client_max_body_size 10m;
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    # REPLACE (not append) X-Forwarded-For with the single peer address this
    # gateway vouches for. The Go rate limiter (ratelimit.go clientIP) takes
    # the RIGHTMOST XFF entry; appending would make that entry whatever peer
    # dialed nginx — behind Cloudflare that is a CF edge IP, collapsing all
    # users into shared rate-limit buckets. In production the realip module
    # (production/nginx/cloudflare-realip.conf) has already rewritten
    # $remote_addr to CF-Connecting-IP for connections from Cloudflare's
    # ranges; direct peers keep their socket IP, so the value stays
    # unspoofable either way. In the deployment stack (no realip conf)
    # $remote_addr is nginx's actual peer — the same value
    # $proxy_add_x_forwarded_for used to put rightmost.
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Must precede the generic /app/ block. `if` here is the documented-safe
# rewrite-only form; `last` re-enters location matching and lands in the
# /api/ proxy above. Headers repeated: nested blocks don't inherit
# add_header from siblings.
location ~ ^/app/share/ {
    if ($share_prerender) {
        rewrite ^/app/share/(.*)$ /api/v1/share-preview/$1 last;
    }
    try_files $uri /app/index.html;

    add_header Cross-Origin-Embedder-Policy require-corp;
    add_header Cross-Origin-Opener-Policy same-origin;
}

location /app/ {
    try_files $uri $uri/ /app/index.html;

    add_header Cross-Origin-Embedder-Policy require-corp;
    add_header Cross-Origin-Opener-Policy same-origin;
}

# App-shell files that change IN PLACE on every deploy — flutter build does
# NOT content-hash their filenames (verified against a real build/web output),
# so they must never be immutable. `no-cache` (not no-store) lets browsers
# keep a copy but forces ETag revalidation, so returning visitors pick up a
# new release on the next load. index.html is also the try_files fallback for
# /app/ deep links and bare /app/, which land here via internal redirect.
# Headers repeated: add_header is not inherited between blocks.
location ~ ^/app/(?:index\.html|flutter_service_worker\.js|flutter_bootstrap\.js|main\.dart\.js|flutter\.js|version\.json|manifest\.json)$ {
    add_header Cache-Control "no-cache";
    add_header Cross-Origin-Embedder-Policy require-corp;
    add_header Cross-Origin-Opener-Policy same-origin;
}

# Long-lived caching ONLY for the service-worker-managed resource trees
# (fonts live under assets/). Their URLs are stable across deploys;
# flutter_service_worker.js (no-cache above) owns their versioning via its
# content-hash manifest and re-fetches entries whose hash changed. Anything
# else that used to match a blanket *.js/*.css/... extension rule (e.g.
# favicon.png, splash/) now falls through to the /app/ prefix block and gets
# default ETag-validated caching instead of being pinned for a year.
location ~ ^/app/(?:assets|canvaskit|icons)/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Cross-Origin-Embedder-Policy require-corp;
    add_header Cross-Origin-Opener-Policy same-origin;
}

# Legal pages — static HTML, shared source of truth in dockerize/static/
# (copied into this image; the development gateway mounts the same
# directory so /privacy and /terms behave identically on :3000).
location = /privacy {
    default_type text/html;
    alias /usr/share/nginx/html/static/privacy.html;
}

location = /terms {
    default_type text/html;
    alias /usr/share/nginx/html/static/terms.html;
}

# SEO plumbing — same shared static directory as the legal pages.
location = /robots.txt {
    default_type text/plain;
    alias /usr/share/nginx/html/static/robots.txt;
}

location = /sitemap.xml {
    # Empty types{} so default_type wins; mime.types maps .xml to the
    # older text/xml.
    types {}
    default_type application/xml;
    alias /usr/share/nginx/html/static/sitemap.xml;
}

location = / {
    return 301 /app/;
}

location /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
}
