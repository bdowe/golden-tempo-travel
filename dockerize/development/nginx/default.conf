map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;

    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        # Above nginx's 1 MiB default for /transcribe audio clips and /plan
        # image attachments; the Go bodyLimitMiddleware enforces the real
        # per-endpoint caps (widest lane: 20 MiB for /plan).
        client_max_body_size 20m;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Legal pages — static HTML, shared source of truth in dockerize/static/
    # (mounted read-only by docker-compose; the deployment image copies the
    # same directory so /privacy and /terms behave identically on :3000).
    location = /privacy {
        default_type text/html;
        alias /usr/share/nginx/html/static/privacy.html;
    }

    location = /terms {
        default_type text/html;
        alias /usr/share/nginx/html/static/terms.html;
    }

    # SEO plumbing — same shared static directory as the legal pages.
    location = /robots.txt {
        default_type text/plain;
        alias /usr/share/nginx/html/static/robots.txt;
    }

    location = /sitemap.xml {
        # Empty types{} so default_type wins; mime.types maps .xml to the
        # older text/xml.
        types {}
        default_type application/xml;
        alias /usr/share/nginx/html/static/sitemap.xml;
    }

    location / {
        proxy_pass http://flutter:8080;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
