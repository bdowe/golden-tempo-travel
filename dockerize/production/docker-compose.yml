# Production stack for https://goldentempotravel.com — same topology as
# dockerize/deployment/docker-compose.yml, but runs prebuilt images from
# GHCR (no build:) and reaches the internet exclusively through a
# Cloudflare Tunnel (the cloudflared service below dials OUT to Cloudflare;
# nothing here publishes a host port, and the host needs no inbound
# firewall openings at all). TLS terminates at the Cloudflare edge; the
# tunnel leg is encrypted by cloudflared itself, so the gateway serves
# plain :80 on the private compose network only. All nginx config is
# volume-mounted, never baked, so a config change is
# `docker compose up -d --force-recreate gateway`, not an image rebuild.
#
# Runs from /opt/goldentempo/ on the production host with a .env file next
# to it (copy .env.sample in this directory and fill it in). Compose reads
# that same .env automatically for ${...} interpolation, so
# POSTGRES_PASSWORD / IMAGE_TAG / TUNNEL_TOKEN below and the api's
# env_file all come from one file.
services:
  chrome:
    image: chromedp/headless-shell:latest
    expose:
      - "9222"
    shm_size: '2gb'
    restart: unless-stopped
    networks:
      - travel-planner-network

  postgres:
    image: postgres:16-alpine
    # No env_file here on purpose: postgres only needs its own three vars,
    # not the API keys and SMTP credentials the rest of .env carries.
    # POSTGRES_PASSWORD is interpolated from the same .env (compose loads it
    # automatically) with NO default — `docker compose config/up` fails fast
    # with a clear error instead of booting a database with a known password.
    # The api's DATABASE_URL below is composed from the same variable, so the
    # two can never drift.
    environment:
      POSTGRES_USER: travel
      POSTGRES_DB: travel_planner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    # No `ports:` on purpose — 5432 must stay unpublished. The database is
    # reachable only from containers on the private compose bridge network,
    # which is also why sslmode=disable on the api's DATABASE_URL is safe.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel -d travel_planner"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - travel-planner-network

  api:
    image: ghcr.io/bdowe/goldentempo-api:${IMAGE_TAG:-latest}
    expose:
      - "8080"
    # All runtime config reaches the api via env_file passthrough from .env:
    # provider keys (GOOGLE_PLACES_API_KEY, ANTHROPIC_API_KEY,
    # DUFFEL_ACCESS_TOKEN, TICKETMASTER_API_KEY, FERRYHOPPER_AFFILIATE_ID,
    # BOOKING_AFFILIATE_ID), SMTP_*, PUBLIC_BASE_URL / PUBLIC_APP_PATH,
    # SENTRY_DSN / SENTRY_RELEASE, ALLOWED_ORIGINS, ALERT_* / FREE_* tuning.
    # See .env.sample in this directory for the full annotated inventory.
    # The `environment:` block holds only values that are composed or pinned
    # by the stack itself; compose gives `environment:` precedence over
    # env_file, so anything stale in .env (e.g. a localhost DATABASE_URL)
    # cannot leak in.
    env_file:
      - .env
    environment:
      - GO_ENV=production
      - CHROME_WS_URL=ws://chrome:9222/
      # Composed from the same POSTGRES_PASSWORD the postgres service boots
      # with, so credentials cannot drift between the two services.
      # sslmode=disable is acceptable here — and only here — because the
      # connection never leaves the host: postgres publishes no host port
      # (no `ports:` above, keep it that way) and both containers sit on the
      # same private compose bridge network. TLS would only encrypt
      # loopback-equivalent traffic between two containers on one machine.
      - DATABASE_URL=postgres://travel:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/travel_planner?sslmode=disable
    depends_on:
      chrome:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - travel-planner-network

  gateway:
    image: ghcr.io/bdowe/goldentempo-gateway:${IMAGE_TAG:-latest}
    # No ports: on purpose — the only way in is the cloudflared service on
    # the private compose network. Publishing 80/443 here would bypass the
    # tunnel AND the real-IP trust model in nginx/cloudflare-realip.conf.
    volumes:
      # prod.conf replaces the baked-in :80 localhost server; the shared
      # location snippet + $share_prerender map stay from the image.
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/cloudflare-realip.conf:/etc/nginx/conf.d/cloudflare-realip.conf:ro
    depends_on:
      - api
    healthcheck:
      # The apex server is default_server on :80, so "localhost" lands there.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - travel-planner-network

  # Outbound-only connector to the Cloudflare edge. The tunnel's public
  # hostnames (configured in the Zero Trust dashboard) route
  # goldentempotravel.com → http://gateway:80 and ssh.goldentempotravel.com →
  # ssh://172.28.0.1:22 (the host, via the pinned bridge gateway address;
  # ufw must allow 22 from 172.28.0.0/16) for CI deploys. cloudflared sets
  # CF-Connecting-IP
  # on every proxied request, which nginx/cloudflare-realip.conf restores as
  # the client address — see that file for why the compose subnet below is
  # the trusted range.
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN:?TUNNEL_TOKEN must be set}
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - travel-planner-network

volumes:
  postgres_data:

networks:
  travel-planner-network:
    driver: bridge
    # Pinned so nginx/cloudflare-realip.conf can trust exactly this range
    # (the cloudflared container is the only possible client of gateway:80).
    # Change the subnet there if you change it here.
    ipam:
      config:
        - subnet: 172.28.0.0/16
