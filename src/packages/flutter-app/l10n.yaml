# Localization codegen (specs/i18n-spanish). Regenerated by `flutter gen-l10n`,
# and automatically by `flutter pub get` / build thanks to `generate: true` in
# pubspec.yaml.
#
# The generated app_localizations*.dart land in lib/l10n next to the .arb files
# and ARE committed, matching how the json_serializable .g.dart files are
# handled in this repo — so `flutter analyze` in CI works without a codegen step
# running first.
arb-dir: lib/l10n
template-arb-file: app_en.arb
output-localization-file: app_localizations.dart
output-class: AppLocalizations

# Non-nullable getter: AppLocalizations.of(context) is always present because
# the delegates are installed at the MaterialApp root.
nullable-getter: false

# Any message missing from a non-template .arb is written here, so CI can assert
# translation coverage is complete rather than silently shipping English.
untranslated-messages-file: l10n_untranslated.json
