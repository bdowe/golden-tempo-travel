<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <!-- Legacy hash-URL shim: pre-path-strategy links look like /#/share/abc.
       Rewrite them to the real path (base-href aware) before the Flutter
       engine reads the URL, so old links in chats and emails keep working. -->
  <script>
    if (location.hash.startsWith('#/')) {
      var base = document.querySelector('base').getAttribute('href') || '/';
      history.replaceState(null, '',
          base.replace(/\/$/, '') + location.hash.slice(1) + location.search);
    }
  </script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Golden Tempo Travel - Plan trips, optimize routes, and build itineraries with AI.">

  <!-- SEO / social sharing (app landing; per-trip share links are prerendered
       server-side via /api/v1/share-preview and don't use these). -->
  <link rel="canonical" href="https://goldentempotravel.com/app/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Golden Tempo Travel">
  <meta property="og:title" content="Golden Tempo Travel">
  <meta property="og:description" content="Golden Tempo Travel - Plan trips, optimize routes, and build itineraries with AI.">
  <meta property="og:url" content="https://goldentempotravel.com/app/">
  <meta property="og:image" content="https://goldentempotravel.com/app/icons/Icon-512.png">
  <meta name="twitter:card" content="summary">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Golden Tempo Travel">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Golden Tempo Travel</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00695C">

  <!--
    Boot splash shown while flutter_bootstrap.js + main.dart.js download and
    the engine starts. Pixel-matched to the in-app SplashScreen (lib/screens/
    splash_screen.dart) — same gradient, badge geometry, and spinner position —
    so the flutter-first-frame handoff reads as one continuous screen. If you
    change dimensions here, change splash_screen.dart too.
  -->
  <style>
    html {
      /* Paints before/if the gradient parses — no white flash. */
      background-color: #00695C;
      height: 100%;
    }
    body {
      margin: 0;
      height: 100%;
      background: linear-gradient(to bottom right, #00897B, #004D40) fixed;
    }
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: linear-gradient(to bottom right, #00897B, #004D40);
      opacity: 1;
      transition: opacity 300ms ease-out;
      pointer-events: none;
    }
    #splash.splash-hidden { opacity: 0; }
    .splash-badge {
      position: absolute;
      top: 50%;
      left: 50%;
      /* The pulse animates `transform`, so the keyframes must repeat this
         centering translate or the animation stomps it. */
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.92);
      display: grid;
      place-items: center;
      animation: splash-pulse 1.8s ease-in-out infinite alternate;
    }
    .splash-badge img {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }
    @keyframes splash-pulse {
      from { transform: translate(-50%, -50%) scale(1); }
      to   { transform: translate(-50%, -50%) scale(1.04); }
    }
    .splash-spinner {
      position: absolute;
      top: calc(50% + 96px);
      left: 50%;
      width: 24px;
      height: 24px;
      margin: -12px 0 0 -12px;
      border: 2.5px solid rgba(255, 255, 255, 0.30);
      border-top-color: rgba(255, 255, 255, 0.95);
      border-radius: 50%;
      animation: splash-spin 1s linear infinite;
    }
    @keyframes splash-spin { to { transform: rotate(360deg); } }
  </style>

</head>
<body>
  <div id="splash">
    <div class="splash-badge">
      <img src="splash/golden_tempo_mark.png" alt="Golden Tempo Travel">
    </div>
    <div class="splash-spinner"></div>
  </div>

  <script>
    // Fade the boot splash out once Flutter paints its first frame (the in-app
    // SplashScreen, pixel-matched to the markup above).
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      if (!splash) return;
      splash.classList.add('splash-hidden');
      var remove = function () { splash.remove(); };
      splash.addEventListener('transitionend', remove, { once: true });
      setTimeout(remove, 600); // fallback if transitionend never fires
    });
  </script>

  <script>
    // Password-manager autofill shim (v3). Flutter web only gives the
    // *focused* text field a real DOM rect; its AutofillGroup siblings are
    // left at 0x0 (upstream flutter/flutter#61301, #127694). Password
    // managers run anti-phishing visibility checks per field — including an
    // occlusion check: elementFromPoint(field center) must return the field
    // itself (Bitwarden's DomElementVisibilityService; 1Password behaves
    // the same). elementFromPoint skips pointer-events:none elements, so
    // siblings must be pe:auto to qualify — and because the engine ignores
    // pointer events not targeted at its own surface, we intercept pointer
    // events on the siblings and re-dispatch clones at the engine element
    // beneath, so a user click on a sibling still focuses the right
    // Flutter field.
    (function () {
      console.info('[autofill] shim v3 active');
      var diagnosed = new WeakSet();
      var forwarded = new WeakSet();
      function logFillEvent(e) {
        // Verbose-level breadcrumbs for debugging real password-manager
        // behavior (DevTools console, "Verbose" filter, search "autofill").
        console.debug('[autofill] ' + e.type +
            ' on ' + (e.target.getAttribute('autocomplete') || e.target.name) +
            ' len=' + (e.target.value || '').length +
            ' trusted=' + e.isTrusted +
            ' inputType=' + (e.inputType || '-'));
      }
      // A pointer event landed on a non-focused autofill input. Cancel it
      // (also suppresses the compatibility mouse events) and re-dispatch a
      // clone at whatever the engine has under that point, found by
      // momentarily making this input click-transparent.
      function forwardToFlutter(e) {
        var el = e.currentTarget;
        if (el.classList.contains('flt-text-editing')) return; // now focused
        e.preventDefault();
        e.stopImmediatePropagation();
        el.style.pointerEvents = 'none';
        var under = document.elementFromPoint(e.clientX, e.clientY);
        el.style.pointerEvents = 'auto';
        if (!under || under === el) return;
        under.dispatchEvent(new e.constructor(e.type, {
          bubbles: true,
          cancelable: true,
          composed: true,
          view: window,
          detail: e.detail,
          clientX: e.clientX,
          clientY: e.clientY,
          screenX: e.screenX,
          screenY: e.screenY,
          button: e.button,
          buttons: e.buttons,
          pointerId: e.pointerId,
          pointerType: e.pointerType,
          isPrimary: e.isPrimary,
        }));
      }
      function sizeAutofillForm() {
        var focused = document.querySelector(
            'form input.flt-text-editing, form textarea.flt-text-editing');
        if (!focused || !focused.form) return;
        var rect = focused.getBoundingClientRect();
        if (!rect.width || !rect.height) return;
        var fields = Array.prototype.filter.call(
            focused.form.querySelectorAll('input, textarea'),
            function (el) { return el.type !== 'submit'; });
        var focusedIdx = fields.indexOf(focused);
        var minY = rect.top;
        var maxY = rect.top + rect.height;
        fields.forEach(function (el, i) {
          if (!diagnosed.has(el)) {
            diagnosed.add(el);
            el.addEventListener('input', logFillEvent);
            el.addEventListener('change', logFillEvent);
          }
          var y = rect.top + (i - focusedIdx) * (rect.height + 40);
          if (el !== focused) {
            if (el.offsetWidth <= 0 && el.offsetHeight <= 0) {
              el.style.position = 'absolute';
              el.style.top = '0px';
              el.style.left = '0px';
              el.style.transform =
                  'translate(' + rect.left + 'px, ' + y + 'px)';
              el.style.width = rect.width + 'px';
              el.style.height = rect.height + 'px';
            } else {
              y = el.getBoundingClientRect().top;
            }
            // pe:auto (not none) so elementFromPoint returns the field and
            // the extensions' occlusion check passes; the pointer listeners
            // hand real user clicks back to the engine.
            el.style.pointerEvents = 'auto';
            if (!forwarded.has(el)) {
              forwarded.add(el);
              el.addEventListener('pointerdown', forwardToFlutter);
              el.addEventListener('pointerup', forwardToFlutter);
            }
          }
          minY = Math.min(minY, y);
          maxY = Math.max(maxY, y + rect.height);
        });
        // Extensions treat 0x0 forms as hidden/honeypot forms and skip
        // their fields — give the form itself a real size. It must stay
        // static AND unmargined at its natural spot: positioning it would
        // make it the containing block for the engine's absolutely-placed
        // inputs, and empirically even margins break the engine's
        // focus-switch between fields. pointer-events:none keeps the sized
        // box click-transparent; inputs win pe back explicitly above.
        var form = focused.form;
        if (form.offsetWidth <= 0 || form.offsetHeight <= 0) {
          form.style.width = rect.width + 'px';
          form.style.height = (maxY - minY) + 'px';
          form.style.pointerEvents = 'none';
        }
        if (getComputedStyle(focused).pointerEvents === 'none') {
          focused.style.pointerEvents = 'auto';
        }
      }
      // Run synchronously inside the observer callback: our observer is
      // registered before extension content scripts, so the fields are
      // already sized when the extension's own observer sees the same
      // mutation batch and analyzes the form.
      new MutationObserver(sizeAutofillForm).observe(document.body, {
        childList: true,
        subtree: true,
        attributes: true,
        attributeFilter: ['style', 'class'],
      });
      document.addEventListener('focusin', sizeAutofillForm, true);
    })();
  </script>

  <!-- Flutter initialization: build-generated bootstrap (inlines the loader,
       the build config, and the injected service-worker version — verified in
       build/web/flutter_bootstrap.js). Replaces the deprecated
       serviceWorkerVersion/loadEntrypoint pattern, which Flutter 3.35 warns
       about at build time. -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
